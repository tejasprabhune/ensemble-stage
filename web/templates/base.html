<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Stage{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles/tokens.css">
  <link rel="stylesheet" href="/static/styles/base.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="topbar-public">
  <a class="wordmark" href="/">
    <span class="wordmark-glyph">&#9680;</span>
    Stage
  </a>
  <div class="topbar-right">
    <a href="/docs">Docs</a>
    {% if let Some(login) = user.github_login %}
      <a class="btn btn-sm" href="/{{ login }}">{{ login }}</a>
    {% else %}
      <a class="btn btn-primary btn-sm" href="/auth/github/login">Sign in with GitHub</a>
    {% endif %}
  </div>
</header>

<div class="page-body">
  {% block content %}{% endblock %}
</div>

</body>
</html>
