name: E2E

on:
  push:
    branches: ["main", "stage-*"]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stage
          POSTGRES_PASSWORD: stage
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://stage:stage@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release server
        run: cargo build --release --bin stage-server

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --quiet

      - name: Install Python test dependencies
        run: uv pip install pytest pytest-playwright psycopg2-binary requests

      - name: Install Playwright Chromium
        run: uv run playwright install chromium --with-deps

      - name: Run E2E tests
        run: python3 -m pytest tests/e2e/ -v --tb=short -q
        env:
          TEST_DATABASE_URL: postgres://stage:stage@localhost:5432/postgres

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/e2e/audit_screenshots/
          if-no-files-found: ignore
