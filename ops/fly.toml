app = "ensemble-stage"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  context = ".."

[env]
  PORT = "8080"
  RUST_LOG = "info,stage_server=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[statics]]
  guest_path = "/app/web/static"
  url_prefix = "/static"

[deploy]
  strategy = "rolling"

# Postgres is attached via `fly postgres attach` and injects DATABASE_URL.
# GitHub OAuth credentials and JWT_SECRET are set via `fly secrets set`.
# Run migrations before the first deploy:
#   fly ssh console -C "sqlx migrate run --source ops/migrations"
